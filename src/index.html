<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Azure</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
    .card { background: white; padding: 2rem 3rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    h1 { color: #0078d4; margin-bottom: 1rem; }
    button { background: #0078d4; color: white; border: none; padding: 0.75rem 2rem; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #005fa3; }
    #message { margin-top: 1.5rem; font-size: 1.25rem; color: #333; min-height: 2rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World Azure</h1>
    <button onclick="getMessage()">Get Message</button>
    <div id="message"></div>
  </div>
  <script>
    async function getMessage() {
      document.getElementById('message').textContent = 'Loading...';
      try {
        const res = await fetch('/api/hello');
        const data = await res.json();
        document.getElementById('message').textContent = data.message;
      } catch (e) {
        document.getElementById('message').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
